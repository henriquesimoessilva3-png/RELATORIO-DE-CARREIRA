<title>Relatório de Carreira — Elenco Botafogo 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>

/* ── RESET ─────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}

/* ── DARK THEME (default) ──────────────── */
:root {
  --bg:#0a0a0a; --card:#141414; --card-border:#252525;
  --text:#e8e8e8; --text-muted:#555; --text-dim:#888;
  --gold:#e8b400; --gold-bg:rgba(232,180,0,0.09); --gold-border:rgba(232,180,0,0.5);
  --th-bg:#1c1c1c; --row-alt:rgba(255,255,255,0.025);
  --header-bg:#000; --controls-bg:#0f0f0f;
  --input-bg:#1a1a1a; --input-border:#2a2a2a;
  --tab-border:#2a2a2a; --tab-active-bg:var(--gold); --tab-active-color:#000;
  --card-header-bg:linear-gradient(135deg,#181818 0%,#111 100%);
  --photo-bg:#1e1e1e; --photo-border:#2a2a2a;
  --placeholder-color:#333;
  --card-name-color:#fff; --total-val-color:#fff;
  --totals-row-bg:#1a1a1a; --totals-row-border:#252525;
  --best-season-text:#fff;
  --divider:#2a2a2a;
  --cf-pos:52,199,89; --cf-neg:255,75,65;
  --toggle-icon:"☀️"; --toggle-bg:#1a1a1a; --toggle-border:#333;
}
/* ── LIGHT THEME ───────────────────────── */
body.light {
  --bg:#efefef; --card:#ffffff; --card-border:#d8d8d8;
  --text:#1a1a1a; --text-muted:#aaa; --text-dim:#666;
  --gold:#b38a00; --gold-bg:rgba(179,138,0,0.08); --gold-border:rgba(179,138,0,0.4);
  --th-bg:#f5f5f5; --row-alt:rgba(0,0,0,0.025);
  --header-bg:#111; --controls-bg:#fff;
  --input-bg:#f5f5f5; --input-border:#ddd;
  --tab-border:#ddd; --tab-active-bg:#111; --tab-active-color:#fff;
  --card-header-bg:linear-gradient(135deg,#fafafa 0%,#f0f0f0 100%);
  --photo-bg:#e8e8e8; --photo-border:#ccc;
  --placeholder-color:#ccc;
  --card-name-color:#111; --total-val-color:#111;
  --totals-row-bg:#f2f2f2; --totals-row-border:#e0e0e0;
  --best-season-text:#111;
  --divider:#ddd;
  --cf-pos:22,150,50; --cf-neg:195,35,25;
  --toggle-icon:"🌙"; --toggle-bg:#e8e8e8; --toggle-border:#ccc;
}

body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;line-height:1.5;min-height:100vh;transition:background .3s,color .3s}

/* ── HEADER ─────────────────────────────── */
.site-header{
  background:var(--header-bg);border-bottom:2px solid var(--gold);
  padding:28px 40px;display:flex;align-items:center;gap:20px;
  position:sticky;top:0;z-index:100;
}
.header-logo{width:52px;height:52px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:22px;color:#000;flex-shrink:0}
.header-titles{flex:1}
.header-titles h1{font-family:'Bebas Neue';font-size:32px;letter-spacing:3px;color:#fff;line-height:1}
.header-titles p{color:#888;font-size:12px;font-weight:300;letter-spacing:2px;text-transform:uppercase;margin-top:3px}
.header-stats{display:flex;gap:28px}
.hstat{text-align:center}
.hstat-val{font-family:'Bebas Neue';font-size:26px;color:var(--gold);line-height:1}
.hstat-lbl{font-size:10px;color:#666;text-transform:uppercase;letter-spacing:1px}

/* ── CONTROLS ───────────────────────────── */
.controls{
  background:var(--controls-bg);border-bottom:1px solid var(--card-border);
  padding:14px 40px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  position:sticky;top:88px;z-index:99;
  box-shadow:0 2px 8px rgba(0,0,0,0.15);
}
.search-wrap{position:relative}
.search-wrap input{
  background:var(--input-bg);border:1px solid var(--input-border);
  color:var(--text);padding:8px 12px 8px 34px;
  border-radius:6px;font-family:'DM Sans';font-size:13px;
  outline:none;width:200px;transition:.2s;
}
.search-wrap input:focus{border-color:var(--gold)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:14px}
.filter-tabs{display:flex;gap:5px;flex-wrap:wrap;flex:1}
.tab{
  padding:5px 12px;border-radius:20px;
  border:1px solid var(--tab-border);background:transparent;
  color:var(--text-dim);font-family:'DM Sans';font-size:12px;
  cursor:pointer;transition:.2s;white-space:nowrap;font-weight:500;
}
.tab:hover{border-color:var(--gold);color:var(--gold)}
.tab.active{background:var(--tab-active-bg);border-color:var(--tab-active-bg);color:var(--tab-active-color);font-weight:700}
.count-badge{background:rgba(128,128,128,0.2);color:var(--text-dim);padding:1px 5px;border-radius:8px;font-size:10px;margin-left:3px}
.tab.active .count-badge{background:rgba(0,0,0,0.2);color:inherit;opacity:.7}

/* action buttons */
.btn-icon{
  padding:7px 14px;border-radius:8px;border:1px solid var(--toggle-border);
  background:var(--toggle-bg);color:var(--text);font-family:'DM Sans';
  font-size:12px;cursor:pointer;transition:.2s;white-space:nowrap;
  display:flex;align-items:center;gap:6px;font-weight:500;
}
.btn-icon:hover{border-color:var(--gold);color:var(--gold)}
.btn-icon svg{width:14px;height:14px;flex-shrink:0}

/* ── GRID ───────────────────────────────── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(640px,1fr));gap:24px;padding:32px 40px}

/* ── PLAYER CARD ────────────────────────── */
.player-card{
  background:var(--card);border:1px solid var(--card-border);
  border-radius:12px;overflow:hidden;transition:border-color .2s,box-shadow .2s;
}
body.light .player-card{box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.player-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.2)}

.card-header{
  display:flex;align-items:center;gap:16px;padding:16px 20px;
  background:var(--card-header-bg);border-bottom:1px solid var(--card-border);
  border-top:3px solid var(--pos-color, var(--gold));
  position:relative;
}

.player-photo{
  width:72px;height:72px;border-radius:8px;
  background:var(--photo-bg);
  border:2px solid var(--pos-color, var(--card-border));
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;overflow:hidden;
}
.player-photo img{width:100%;height:100%;object-fit:cover;object-position:top center}
.photo-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%}
.photo-number{font-family:'Bebas Neue';font-size:26px;color:var(--placeholder-color);line-height:1}
.photo-initials{font-size:9px;color:var(--placeholder-color);text-transform:uppercase;letter-spacing:1px}

.card-info{flex:1;min-width:0}
.card-name{font-family:'Bebas Neue';font-size:22px;color:var(--card-name-color);letter-spacing:1px;line-height:1.1}
.card-meta{display:flex;align-items:center;gap:8px;margin-top:4px;flex-wrap:wrap}
.card-pos{
  padding:2px 9px;border-radius:4px;
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;
  background:var(--pos-color-bg, rgba(128,128,128,0.15));
  color:var(--pos-color, var(--text-dim));
  border:1px solid var(--pos-color-border, rgba(128,128,128,0.25));
}
.card-num{font-family:'Bebas Neue';font-size:16px;color:var(--gold)}
.card-totals{display:flex;gap:12px;margin-top:10px;flex-wrap:wrap}
.total-item{text-align:center}
.total-val{font-family:'Bebas Neue';font-size:19px;color:var(--total-val-color);line-height:1}
.total-lbl{font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px}
.divider{width:1px;background:var(--divider);align-self:stretch}

/* ── TABLE ──────────────────────────────── */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{
  background:var(--th-bg);padding:7px 10px;font-size:10px;font-weight:600;
  text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);
  text-align:right;border-bottom:1px solid var(--card-border);white-space:nowrap;
  cursor:pointer;user-select:none;transition:color .15s,background .15s;position:relative;
}
thead th:first-child,thead th:nth-child(2){text-align:left}
thead th:hover{color:var(--text);background:rgba(232,180,0,0.06)}
thead th.sort-asc,thead th.sort-desc{color:var(--gold)}
thead th.sort-asc::after{content:' ↑';font-size:9px;opacity:.9}
thead th.sort-desc::after{content:' ↓';font-size:9px;opacity:.9}
tbody tr{border-bottom:1px solid var(--row-alt)}
tbody tr:nth-child(even){background:var(--row-alt)}
tbody tr.best-season{background:var(--gold-bg)!important;border-left:3px solid var(--gold)}
tbody tr.best-season td{color:var(--best-season-text)}
td{padding:6px 10px;text-align:right;white-space:nowrap}
td:first-child{text-align:left;font-size:12px;color:var(--text-dim);font-weight:500}
td:nth-child(2){text-align:left;max-width:160px;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.totals-row{background:var(--totals-row-bg)!important;border-top:2px solid var(--totals-row-border)}
.totals-row td{font-weight:600;color:var(--total-val-color);font-size:13px}
.totals-row td:first-child{font-family:'Bebas Neue';font-size:13px;letter-spacing:1px;color:var(--gold)}

.best-label{
  display:inline-flex;align-items:center;gap:3px;
  background:rgba(232,180,0,0.15);border:1px solid rgba(232,180,0,0.3);color:var(--gold);
  padding:1px 6px;border-radius:3px;font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
}

.no-results{grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--text-muted)}
.no-results h3{font-family:'Bebas Neue';font-size:32px;color:var(--card-border)}

footer{text-align:center;padding:32px;border-top:1px solid var(--card-border);color:var(--text-muted);font-size:12px;margin-top:20px}

/* ── PRINT ──────────────────────────────── */
@media print {
  @page{margin:15mm 10mm;size:A4}
  .controls,.site-header .header-stats,.btn-icon{display:none!important}
  .site-header{position:relative;top:0;padding:14px 20px;background:#000!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .controls{display:none!important}
  .grid{padding:8px;gap:14px;grid-template-columns:1fr;display:block}
  .player-card{page-break-inside:avoid;break-inside:avoid;margin-bottom:14px;border:1px solid #ccc!important}
  .card-header{background:#f5f5f5!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  body,body.light{background:#fff!important;color:#000!important}
  td,th{font-size:11px!important}
  .table-wrap{overflow:visible}
}

/* ── MOBILE ──────────────────────────────── */
@media(max-width:768px){

  .site-header{padding:12px 16px;gap:10px;flex-wrap:wrap}
  .header-logo{width:38px;height:38px;font-size:16px}
  .header-titles h1{font-size:20px;letter-spacing:1px}
  .header-titles p{display:none}
  .header-stats{display:none}

  .controls{
    padding:8px 12px;gap:6px;top:62px;
    flex-direction:column;align-items:stretch;
  }
  .controls-top{display:flex;gap:8px;align-items:center}
  .search-wrap{flex:1}
  .search-wrap input{width:100%;font-size:14px}
  .btn-icon{padding:7px 12px;font-size:12px;justify-content:center;flex:1}
  .btn-icon-text{display:none}

  .filter-tabs{
    display:flex;gap:5px;flex-wrap:nowrap;
    overflow-x:auto;-webkit-overflow-scrolling:touch;
    scrollbar-width:none;padding-bottom:2px;flex:unset;
  }
  .filter-tabs::-webkit-scrollbar{display:none}
  .tab{flex-shrink:0;padding:5px 10px;font-size:11px}

  .grid{padding:10px 10px;grid-template-columns:1fr;gap:12px}

  .card-header{padding:12px 12px;gap:10px}
  .player-photo{width:58px;height:58px}
  .photo-number{font-size:20px}
  .card-name{font-size:17px}
  .card-pos{font-size:9px;padding:2px 6px}
  .card-num{font-size:13px}
  .card-totals{gap:8px;margin-top:8px}
  .total-val{font-size:15px}
  .total-lbl{font-size:8px}
  .divider{display:none}

  table{font-size:11px}
  thead th{padding:5px 6px;font-size:9px;letter-spacing:.3px}
  td{padding:5px 6px}
  td:nth-child(2){max-width:100px}
  .totals-row td{font-size:11px}
  .best-label{font-size:8px;padding:1px 4px}

  footer{padding:20px 14px;font-size:11px}
}

</style>
</head>

// ── POSITION COLORS ──────────────────────
const POS_COLORS = {
  'Goleiro':          '#1976D2',
  'Zagueiro':         '#C62828',
  'Lateral Direito':  '#E65100',
  'Lateral Esquerdo': '#F9A825',
  'Volante':          '#6A1B9A',
  'Meia':             '#00796B',
  'Atacante':         '#2E7D32',
  'Centroavante':     '#AD1457',
};

// ── HELPERS ───────────────────────────────
const POSITIONS_ORDER = ['Todos','Goleiro','Zagueiro','Lateral Direito','Lateral Esquerdo','Volante','Meia','Atacante','Centroavante'];
function fmt(v){ return (v===null||v===undefined||v==='')?'—':v; }
function fmtMin(v){ if(!v)return'—'; return v.toLocaleString('pt-BR'); }
function fmtBig(v){ if(!v&&v!==0)return'—'; return v.toLocaleString('pt-BR'); }

function getColRange(rows,key){
  const vals=rows.map(r=>r[key]).filter(v=>v!=null&&v>0);
  if(!vals.length)return null;
  return{min:Math.min(...vals),max:Math.max(...vals)};
}

function cellStyle(val,range,isNeg=false){
  if(val==null||val<=0||!range)return'';
  const{min,max}=range;
  const ratio=max===min?1:(val-min)/(max-min);
  const alpha=(0.03+ratio*0.18).toFixed(2);
  const s=getComputedStyle(document.documentElement);
  const rgb=s.getPropertyValue(isNeg?'--cf-neg':'--cf-pos').trim();
  return `background:rgba(${rgb},${alpha});border-radius:3px;`;
}

function getBestSeason(player){
  const rows=player.career.filter(r=>r.gp&&r.gp>0);
  if(!rows.length)return null;
  if(player.isGK) return rows.reduce((b,r)=>(r.min||0)>(b.min||0)?r:b);
  return rows.reduce((b,r)=>{
    const sc=(r.goals||0)+(r.ast||0);
    const bs=(b.goals||0)+(b.ast||0);
    if(sc>bs)return r;
    if(sc===bs&&(r.min||0)>(b.min||0))return r;
    return b;
  });
}

// ── RENDER ────────────────────────────────
function renderPlayer(player){
  const best=getBestSeason(player);
  const validRows=player.career.filter(r=>r.gp||r.sta||r.min);
  const rangeGP   =getColRange(validRows,'gp');
  const rangeSta  =getColRange(validRows,'sta');
  const rangeMin  =getColRange(validRows,'min');
  const rangeGoals=player.isGK?null:getColRange(validRows,'goals');
  const rangeAst  =player.isGK?null:getColRange(validRows,'ast');
  const rangeGC   =player.isGK?getColRange(validRows,'gc'):null;
  const rangeYC   =getColRange(validRows,'yc');
  const tot=player.totals;
  const pc=POS_COLORS[player.position]||'#e8b400';
  // hex to rgba helper
  function h2r(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}
  const posStyle=`--pos-color:${pc};--pos-color-bg:${h2r(pc,0.15)};--pos-color-border:${h2r(pc,0.35)};`;

  let totHtml='';
  if(player.isGK){
    totHtml=`
      <div class="total-item"><div class="total-val">${fmtBig(tot.gp)}</div><div class="total-lbl">Jogos</div></div>
      <div class="divider"></div>
      <div class="total-item"><div class="total-val">${fmtBig(tot.min)}</div><div class="total-lbl">Minutos</div></div>
      <div class="divider"></div>
      <div class="total-item"><div class="total-val">${fmt(tot.gc)}</div><div class="total-lbl">GC</div></div>
      <div class="divider"></div>
      <div class="total-item"><div class="total-val">${fmt(tot.yc)}</div><div class="total-lbl">Amarelos</div></div>`;
  }else{
    totHtml=`
      <div class="total-item"><div class="total-val">${fmtBig(tot.gp)}</div><div class="total-lbl">Jogos</div></div>
      <div class="divider"></div>
      <div class="total-item"><div class="total-val">${fmtBig(tot.min)}</div><div class="total-lbl">Minutos</div></div>
      <div class="divider"></div>
      <div class="total-item"><div class="total-val">${fmt(tot.goals)}</div><div class="total-lbl">Gols</div></div>
      <div class="divider"></div>
      <div class="total-item"><div class="total-val">${fmt(tot.ast)}</div><div class="total-lbl">Assists</div></div>
      <div class="divider"></div>
      <div class="total-item"><div class="total-val">${fmt(tot.yc)}</div><div class="total-lbl">Amarelos</div></div>`;
  }

  // column definitions: [label, key, isNeg, extraClass]
  const GK_COLS  = [['Temp.','s',false,''],['Time','t',false,''],['Idade','age',false,'col-age'],['GP','gp',false,''],['Sta','sta',false,'col-sta'],['Min','min',false,''],['GC','gc',true,''],['YC','yc',true,''],['RC','rc',true,'']];
  const OUT_COLS = [['Temp.','s',false,''],['Time','t',false,''],['Idade','age',false,'col-age'],['GP','gp',false,''],['Sta','sta',false,'col-sta'],['Min','min',false,''],['Gols','goals',false,''],['Ast','ast',false,''],['YC','yc',true,''],['RC','rc',true,'']];
  const cols = player.isGK ? GK_COLS : OUT_COLS;

  const ranges = {gp:rangeGP,sta:rangeSta,min:rangeMin,goals:rangeGoals,ast:rangeAst,gc:rangeGC,yc:rangeYC};

  function buildTbody(rows, sortKey, sortDir){
    let sorted = [...rows];
    if(sortKey){
      sorted.sort((a,b)=>{
        let av=a[sortKey], bv=b[sortKey];
        // season string sort: treat as string chronological
        if(sortKey==='s'){ av=av||''; bv=bv||''; return sortDir==='asc'?av.localeCompare(bv):bv.localeCompare(av); }
        if(sortKey==='t'){ av=av||''; bv=bv||''; return sortDir==='asc'?av.localeCompare(bv):bv.localeCompare(av); }
        av=av??-1; bv=bv??-1;
        return sortDir==='asc'?av-bv:bv-av;
      });
    }
    let out='';
    sorted.forEach(r=>{
      const isBest=best&&r===best;
      const rowClass=isBest?'best-season':'';
      const bestTag=isBest?`<span class="best-label">★ Melhor</span>`:'';
      out+=`<tr class="${rowClass}">`;
      cols.forEach(([lbl,key,isNeg,cls])=>{
        const val=r[key];
        const rng=ranges[key]||null;
        const st=(key!=='s'&&key!=='t'&&key!=='age')?cellStyle(val,rng,isNeg):'';
        const display=key==='min'?fmtMin(val):fmt(val);
        const extraTag=(key==='s')?bestTag:'';
        const title=(key==='t')?` title="${val}"`:'';
        out+=`<td class="${cls}" style="${st}"${title}>${display}${extraTag}</td>`;
      });
      out+='</tr>';
    });
    return out;
  }

  function buildTotRow(){
    let out='<tr class="totals-row">';
    cols.forEach(([lbl,key])=>{
      if(key==='s'){out+=`<td>TOTAL</td>`;return;}
      if(key==='t'||key==='age'){out+=`<td></td>`;return;}
      const v=tot[key];
      out+=`<td>${key==='min'?fmtMin(v):fmt(v)}</td>`;
    });
    out+='</tr>';
    return out;
  }

  const pid=player.id;
  // default: no sort (natural/chronological order)
  const initTbody=buildTbody(validRows,'s','desc')+buildTotRow();
  sortState[pid]={key:'s',dir:'desc'};

  const thHtml=cols.map(([lbl,key,isNeg,cls],i)=>{
    const align=(i<2)?'text-align:left':'';
    const sortCls=key==='s'?' sort-desc':'';
    return `<th class="${cls}${sortCls}" data-key="${key}" data-pid="${pid}" style="${align}">${lbl}</th>`;
  }).join('');

  return `<div class="player-card" data-pos="${player.position}" data-name="${player.name.toLowerCase()}" style="${posStyle}">
    <div class="card-header">
      <div class="player-photo" id="photo-${player.id}">
        <div class="photo-placeholder">
          <div class="photo-number">${player.number}</div>
          <div class="photo-initials">${player.name.split(' ').map(w=>w[0]).join('').slice(0,3)}</div>
        </div>
      </div>
      <div class="card-info">
        <div class="card-name">${player.name}</div>
        <div class="card-meta">
          <span class="card-pos">${player.position}</span>
          <span class="card-num">#${player.number}</span>
        </div>
        <div class="card-totals">${totHtml}</div>
      </div>
    </div>
    <div class="table-wrap">
      <table data-pid="${pid}">
        <thead><tr>${thHtml}</tr></thead>
        <tbody>${initTbody}</tbody>
      </table>
    </div>
  </div>`;
}

// ── TABLE SORT STATE & HANDLER ────────────────────────
const sortState = {}; // pid -> {key, dir}

function handleTableSort(e){
  const th=e.target.closest('th[data-key]');
  if(!th)return;
  const key=th.dataset.key;
  const pid=parseInt(th.dataset.pid);
  const player=players.find(p=>p.id===pid);
  if(!player)return;

  // toggle dir
  const cur=sortState[pid]||{key:null,dir:'asc'};
  const newDir=(cur.key===key&&cur.dir==='asc')?'desc':'asc';
  sortState[pid]={key,dir:newDir};

  // update th classes in this table
  const table=th.closest('table');
  table.querySelectorAll('th').forEach(t=>{t.classList.remove('sort-asc','sort-desc');});
  th.classList.add(newDir==='asc'?'sort-asc':'sort-desc');

  // rebuild tbody
  const best=getBestSeason(player);
  const validRows=player.career.filter(r=>r.gp||r.sta||r.min);
  const rangeGP   =getColRange(validRows,'gp');
  const rangeSta  =getColRange(validRows,'sta');
  const rangeMin  =getColRange(validRows,'min');
  const rangeGoals=player.isGK?null:getColRange(validRows,'goals');
  const rangeAst  =player.isGK?null:getColRange(validRows,'ast');
  const rangeGC   =player.isGK?getColRange(validRows,'gc'):null;
  const rangeYC   =getColRange(validRows,'yc');
  const tot=player.totals;
  const ranges={gp:rangeGP,sta:rangeSta,min:rangeMin,goals:rangeGoals,ast:rangeAst,gc:rangeGC,yc:rangeYC};
  const GK_COLS  =[['Temp.','s',false,''],['Time','t',false,''],['Idade','age',false,'col-age'],['GP','gp',false,''],['Sta','sta',false,'col-sta'],['Min','min',false,''],['GC','gc',true,''],['YC','yc',true,''],['RC','rc',true,'']];
  const OUT_COLS =[['Temp.','s',false,''],['Time','t',false,''],['Idade','age',false,'col-age'],['GP','gp',false,''],['Sta','sta',false,'col-sta'],['Min','min',false,''],['Gols','goals',false,''],['Ast','ast',false,''],['YC','yc',true,''],['RC','rc',true,'']];
  const cols=player.isGK?GK_COLS:OUT_COLS;

  function buildTbody(rows,sk,sd){
    let sorted=[...rows];
    if(sk){
      sorted.sort((a,b)=>{
        let av=a[sk],bv=b[sk];
        if(sk==='s'||sk==='t'){av=av||'';bv=bv||'';return sd==='asc'?av.localeCompare(bv):bv.localeCompare(av);}
        av=av??-1;bv=bv??-1;
        return sd==='asc'?av-bv:bv-av;
      });
    }
    let out='';
    sorted.forEach(r=>{
      const isBest=best&&r===best;
      const rowClass=isBest?'best-season':'';
      const bestTag=isBest?`<span class="best-label">★ Melhor</span>`:'';
      out+=`<tr class="${rowClass}">`;
      cols.forEach(([lbl,key,isNeg,cls])=>{
        const val=r[key];
        const rng=ranges[key]||null;
        const st=(key!=='s'&&key!=='t'&&key!=='age')?cellStyle(val,rng,isNeg):'';
        const display=key==='min'?fmtMin(val):fmt(val);
        const extraTag=(key==='s')?bestTag:'';
        const title=(key==='t')?` title="${val}"`:'';
        out+=`<td class="${cls}" style="${st}"${title}>${display}${extraTag}</td>`;
      });
      out+='</tr>';
    });
    return out;
  }
  function buildTotRow(){
    let out='<tr class="totals-row">';
    cols.forEach(([lbl,key])=>{
      if(key==='s'){out+=`<td>TOTAL</td>`;return;}
      if(key==='t'||key==='age'){out+=`<td></td>`;return;}
      const v=tot[key];
      out+=`<td>${key==='min'?fmtMin(v):fmt(v)}</td>`;
    });
    out+='</tr>';
    return out;
  }

  table.querySelector('tbody').innerHTML=buildTbody(validRows,key,newDir)+buildTotRow();
}

document.addEventListener('click', handleTableSort);

function injectPhotos(){
  Object.entries(PHOTOS).forEach(([pid,src])=>{
    const el=document.getElementById('photo-'+pid);
    if(!el)return;
    el.innerHTML=`<img src="${src}" style="width:100%;height:100%;object-fit:cover;object-position:top center;border-radius:6px;">`;
  });
}

function renderAll(){
  const search=document.getElementById('search').value.toLowerCase().trim();
  const activeTab=document.querySelector('.tab.active')?.dataset.pos||'Todos';
  const grid=document.getElementById('grid');
  let filtered=players.filter(p=>{
    const matchPos=activeTab==='Todos'||p.position===activeTab;
    const matchSearch=!search||p.name.toLowerCase().includes(search);
    return matchPos&&matchSearch;
  });
  if(!filtered.length){
    grid.innerHTML=`<div class="no-results"><h3>Nenhum jogador encontrado</h3><p>Tente outro filtro ou busca.</p></div>`;
    return;
  }
  grid.innerHTML=filtered.map(renderPlayer).join('');
  injectPhotos();
}

function initTabs(){
  const tabs=document.getElementById('tabs');
  const counts={};
  players.forEach(p=>{counts[p.position]=(counts[p.position]||0)+1;});
  POSITIONS_ORDER.forEach(pos=>{
    const count=pos==='Todos'?players.length:(counts[pos]||0);
    if(pos!=='Todos'&&!counts[pos])return;
    const btn=document.createElement('button');
    btn.className='tab'+(pos==='Todos'?' active':'');
    btn.dataset.pos=pos;
    const pc=pos==='Todos'?null:POS_COLORS[pos];
    if(pc) btn.style.setProperty('--tab-pos-color', pc);
    btn.innerHTML=`${pos}<span class="count-badge">${count}</span>`;
    btn.onclick=()=>{
      document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      btn.classList.add('active');
      renderAll();
    };
    tabs.appendChild(btn);
  });
}

function updateHeaderStats(){
  const totalGP=players.reduce((s,p)=>s+(p.totals.gp||0),0);
  const totalGoals=players.filter(p=>!p.isGK).reduce((s,p)=>s+(p.totals.goals||0),0);
  const totalMin=players.reduce((s,p)=>s+(p.totals.min||0),0);
  document.getElementById('hs-jogos').textContent=totalGP.toLocaleString('pt-BR');
  document.getElementById('hs-gols').textContent=totalGoals.toLocaleString('pt-BR');
  document.getElementById('hs-minutos').textContent=Math.round(totalMin/1000).toLocaleString('pt-BR')+'k';
}
